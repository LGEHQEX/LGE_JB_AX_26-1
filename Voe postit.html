  .slide-frame {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);

    display: flex;
    flex-direction: column;

  .slide-header {
    display: flex;
    align-items: center;
    gap: 12px;

  .slide-header .page-num {
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    margin-left: 4px;
  }

  .notes-grid {
    flex: 1;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    align-content: start;
  }

  /* Sticky Note */
  .sticky {
    border-radius: 2px;
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.55;
    color: #37352F;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.06);
    transition: all 0.25s ease;
    cursor: default;
    min-height: 60px;
    display: flex;
    align-items: center;
    word-break: keep-all;
    border-left: 4px solid #ccc;
  }
  .sticky:hover {
    transform: rotate(0deg) scale(1.04) !important;
    z-index: 10;
    box-shadow: 4px 6px 16px rgba(0,0,0,0.18);
  }

  .bottom-nav {

    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-top: 1px solid #eee;
    background: #fafafa;

    font-weight: 700;

    gap: 6px;

    color: #bbb;
    cursor: default;
  }

    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    height: 8px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0;
  }

  .footer {
    text-align: center;
    margin-top: 16px;
    color: #bbb;
    font-size: 11px;

      "데이터 접근·보고·회의 등 일상 업무의 전체 흐름이 AX에 최적화되도록 프로세스를 근본적으로 재설계해야 합니다",
      "LG 양식에 맞춰 자료를 작성·수정할 수 있는 프롬프트와 활용 가이드를 매뉴얼화하여 전 구성원에게 공유해야 합니다",
      "정기 보고, 지표 정리, CS·품질 데이터 분석 등 반복 업무를 AX 중심 프로세스로 전환하는 것이 가장 빠른 성과 창출 방법입니다",
      "AX의 본질은 구성원의 시간을 반복 업무에서 해방시켜, 판단과 창의가 필요한 더 가치 있는 업무에 재배치하는 것입니다",
      "단순한 자동화 수준을 넘어, 의사결정을 구조적으로 지원하는 도구로서 AX를 활용하는 단계로 나아가야 합니다",
    ],
  },
  {
    id: "mindset", label: "인식 변화 & 동기부여",
    color: "#E0F2F1", borderColor: "#00695C", icon: "💡", count: 10,
    notes: [
      '"이게 될까?"라는 물음표가 "이렇게 하면 된다!"라는 느낌표로 바뀌는 경험을 통해, AX에는 불가능이 없다고 느꼈습니다',
      "복사·붙여넣기 수준으로만 써봤는데도 의미 있는 결과가 나와서, AI의 진입장벽이 생각보다 훨씬 낮다는 걸 체감했습니다",
      "코파일럿은 별로라고 단정짓고 외부 툴만 고집했던 제 모습이, 사실은 제대로 알지 못한 데서 비롯된 편견이었다는 걸 깨달았습니다",
      "AX 도입 전과 후의 일하는 방식 차이가 예상을 훨씬 뛰어넘을 정도로 크다는 점을 이번 교육을 통해 실감했습니다",
      "AI를 바라보는 인식 자체가 완전히 달라진 중요한 전환점이었으며, AX 기반 업무에 대한 기대와 자신감을 갖고 현업에 복귀합니다",
      "AX에 대해 막연하게만 느끼고 있었는데, 이번 과정을 통해 한결 가까워진 느낌을 받았고 실무 적용의 구체적 그림이 그려졌습니다",
      '"진짜 AX가 AX했다" — 기존에 내가 쓰고 있던 수준은 AX의 A 정도였구나 하는 깨달음을 얻었습니다',
      "사람이 반복적으로 수행하던 작업을 간단한 프롬프트 몇 줄만으로 재현할 수 있다는 사실이 가장 인상 깊었습니다",
      "AI 활용에 대한 막연한 두려움이 해소되었고, 업무 효율과 품질을 동시에 끌어올릴 수 있다는 방향성을 명확히 인식하게 되었습니다",
      "AI는 어렵고 전문적인 기술이 아니라, 내가 매일 하는 반복 업무를 덜어주는 실용적 방법이라는 점이 가장 크게 와닿았습니다",
    ],
  },
];

const sorted = [...categories].sort((a, b) => b.count - a.count);
let currentIdx = 0;
const rotations = [-2.5, 1.8, -1.2, 2.8, -0.8, 1.5, -2, 0.9, -1.5, 2.2];

function init() {
  document.getElementById('subtitle').textContent =
    '유형별 VOE 정리 · 빈도 내림차순 · 총 ' + sorted.length + '개 유형';
  renderTabs();
  renderSlide();
  renderDots();
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  sorted.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.innerHTML =
      '<span>' + cat.icon + '</span>' +
      '<span>' + cat.label + '</span>' +
      '<span class="cnt">' + cat.count + '</span>';
    btn.onclick = () => { currentIdx = i; renderSlide(); renderTabs(); renderDots(); };

    if (i === currentIdx) {
      btn.style.background = cat.borderColor;
      btn.style.color = 'white';
      btn.style.borderColor = cat.borderColor;
      btn.querySelector('.cnt').style.background = 'rgba(255,255,255,0.3)';
      btn.querySelector('.cnt').style.color = 'white';
    } else {
      btn.style.borderColor = cat.borderColor;
      btn.querySelector('.cnt').style.background = cat.borderColor + '18';
      btn.querySelector('.cnt').style.color = cat.borderColor;
    }
    container.appendChild(btn);
  });
}

function renderSlide() {
  const cat = sorted[currentIdx];

  // Header
  const header = document.getElementById('slideHeader');
  header.style.borderBottom = '3px solid ' + cat.borderColor;
  header.style.background = cat.color + '66';
  header.innerHTML =
    '<span class="icon">' + cat.icon + '</span>' +
    '<h2>' + cat.label + '</h2>' +
    '<span class="count-badge" style="background:' + cat.borderColor + '">' + cat.count + '건</span>' +
    '<span class="page-num">' + (currentIdx + 1) + ' / ' + sorted.length + '</span>';

  // Notes
  const grid = document.getElementById('notesGrid');
  grid.innerHTML = '';
  cat.notes.forEach((note, i) => {
    const rot = rotations[i % rotations.length];
    const el = document.createElement('div');
    el.className = 'sticky';
    el.style.background = cat.color;
    el.style.borderLeftColor = cat.borderColor;
    el.style.transform = 'rotate(' + rot + 'deg)';
    el.textContent = '\u201C' + note + '\u201D';

    el.onmouseenter = function() {
      this.style.transform = 'rotate(0deg) scale(1.04)';
      this.style.zIndex = '10';
      this.style.boxShadow = '4px 6px 16px rgba(0,0,0,0.18)';
    };
    el.onmouseleave = function() {
      this.style.transform = 'rotate(' + rot + 'deg) scale(1)';
      this.style.zIndex = '1';
      this.style.boxShadow = '2px 3px 8px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.06)';
    };

    grid.appendChild(el);
  });

  // Nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentIdx === 0;
  nextBtn.disabled = currentIdx === sorted.length - 1;
  if (currentIdx > 0) prevBtn.style.background = sorted[currentIdx].borderColor;
  if (currentIdx < sorted.length - 1) nextBtn.style.background = sorted[currentIdx + 1].borderColor;
}

function renderDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  sorted.forEach((cat, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.style.width = i === currentIdx ? '24px' : '8px';
    dot.style.background = i === currentIdx ? cat.borderColor : '#ddd';
    dot.onclick = () => { currentIdx = i; renderSlide(); renderTabs(); renderDots(); };
    container.appendChild(dot);
  });
}

function goPrev() {
  if (currentIdx > 0) { currentIdx--; renderSlide(); renderTabs(); renderDots(); }
}
function goNext() {
  if (currentIdx < sorted.length - 1) { currentIdx++; renderSlide(); renderTabs(); renderDots(); }
}

init();
</script>
</body>
</html>
