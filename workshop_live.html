
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JB AX Mini 워크샵</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --red-light: #FDE7EA;
  --red-hover: #A00D24;
  --dark: #1A1A1A;
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --gray: #888;
  --border: #E0E0E0;
  --gold: #D4A017;
  --green: #2E7D32;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ====== Header ====== */
.header {
  background: var(--dark);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-title { color: var(--white); font-size: 16px; font-weight: 700; }
.header-badge {
  background: var(--red); color: var(--white);
  padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600;
}
.header-back {
  color: var(--white); background: none; border: none;
  font-size: 14px; cursor: pointer; padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
  min-height: 44px; min-width: 44px;
}
.header-back:active { background: rgba(255,255,255,0.2); }

/* ====== Common ====== */
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }
.red-line { height: 4px; background: var(--red); margin-bottom: 20px; }
.page-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
.page-sub { font-size: 14px; color: var(--gray); margin-bottom: 24px; line-height: 1.5; }
.step-badge {
  display: inline-block; background: var(--red); color: var(--white);
  padding: 4px 16px; border-radius: 4px; font-size: 13px; font-weight: 700;
  margin-bottom: 12px;
}

/* ====== Cards ====== */
.card {
  background: var(--white); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .num {
  background: var(--dark); color: var(--white);
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.q-label {
  font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px;
}
.q-hint { font-size: 12px; color: var(--gray); margin-bottom: 8px; font-style: italic; }

/* ====== Inputs ====== */
input[type="text"], textarea, select {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: inherit; font-size: 15px; color: var(--dark);
  background: var(--white); transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
  outline: none; border-color: var(--red);
}
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.input-label {
  font-size: 13px; font-weight: 600; color: var(--dark);
  margin-bottom: 6px; display: block;
}
.input-group { margin-bottom: 16px; }

/* ====== Scale ====== */
.scale-row { margin-bottom: 20px; }
.scale-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); margin-bottom: 4px; }
.scale-options { display: flex; gap: 0; }
.scale-btn {
  flex: 1; padding: 12px 0; text-align: center;
  border: 1.5px solid var(--border); background: var(--white);
  font-size: 16px; font-weight: 600; cursor: pointer; color: var(--dark);
  transition: all 0.2s;
}
.scale-btn:first-child { border-radius: 8px 0 0 8px; }
.scale-btn:last-child { border-radius: 0 8px 8px 0; }
.scale-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
.scale-btn:not(.active):hover { background: var(--red-light); }

/* ====== Buttons ====== */
.btn-primary {
  width: 100%; padding: 16px; background: var(--red); color: var(--white);
  border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; font-family: inherit;
}
.btn-primary:hover { background: var(--red-hover); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary {
  width: 100%; padding: 14px; background: var(--white); color: var(--dark);
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.2s; margin-bottom: 12px;
}
.btn-secondary:hover { border-color: var(--red); color: var(--red); }
.btn-secondary.selected { border-color: var(--red); background: var(--red-light); color: var(--red); }

/* ====== Voting ====== */
.vote-card {
  background: var(--white); border-radius: 14px;
  padding: 24px; margin-bottom: 14px;
  border: 2px solid var(--border); cursor: pointer;
  transition: all 0.25s; text-align: center;
}
.vote-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(200,16,46,0.12); }
.vote-card.voted { border-color: var(--red); background: var(--red-light); }
.vote-card .team-num { font-size: 40px; font-weight: 900; color: var(--red); }
.vote-card .team-name { font-size: 16px; font-weight: 600; margin-top: 4px; color: var(--dark); }
.vote-card .heart { font-size: 28px; margin-top: 8px; }
.vote-count { font-size: 13px; color: var(--gray); margin-top: 4px; }
.vote-remaining {
  text-align: center; padding: 12px; margin-bottom: 16px;
  background: var(--red-light); border-radius: 8px;
  font-size: 14px; font-weight: 600; color: var(--red);
}

/* ====== Progress ====== */
.progress-bar { display: flex; gap: 6px; margin-bottom: 24px; }
.progress-dot {
  flex: 1; height: 5px; border-radius: 3px; background: var(--border);
  transition: background 0.3s;
}
.progress-dot.active { background: var(--red); }
.progress-dot.done { background: var(--green); }

/* ====== Splash ====== */
.splash {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--dark); color: var(--white); text-align: center;
  padding: 40px 20px;
}
.splash h1 { font-size: 14px; font-weight: 400; color: var(--gray); margin-bottom: 12px; letter-spacing: 2px; }
.splash h2 { font-size: 40px; font-weight: 900; margin-bottom: 8px; line-height: 1.2; }
.splash h3 { font-size: 18px; font-weight: 400; color: var(--gray); margin-bottom: 40px; }
.splash-red { color: var(--red); }
.splash .btn-primary { max-width: 320px; margin-bottom: 16px; }
.splash .ft-link {
  color: var(--gray); font-size: 13px; cursor: pointer; text-decoration: underline;
  background: none; border: none; font-family: inherit; margin-top: 8px;
}

/* ====== FT Dashboard ====== */
.ft-team-card {
  background: var(--white); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 12px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.2s;
}
.ft-team-card:hover { border-color: var(--red); }
.ft-team-card .status {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.status-submitted { background: #E8F5E9; color: var(--green); }
.status-pending { background: #FFF3E0; color: #E65100; }
.ft-detail-section { margin-bottom: 20px; }
.ft-detail-section h4 {
  font-size: 14px; font-weight: 700; color: var(--red);
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 2px solid var(--red);
}
.ft-detail-section p { font-size: 14px; line-height: 1.7; color: var(--dark); white-space: pre-wrap; }
.ft-scale-display { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.ft-scale-item {
  background: var(--bg); padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
}
.ft-scale-item span { color: var(--red); font-weight: 800; font-size: 18px; }

.vote-bar-container { margin-bottom: 12px; }
.vote-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 14px; font-weight: 600; }
.vote-bar-bg { height: 32px; background: var(--bg); border-radius: 8px; overflow: hidden; position: relative; }
.vote-bar-fill {
  height: 100%; background: var(--red); border-radius: 8px;
  transition: width 0.6s ease; display: flex; align-items: center;
  padding-left: 10px; color: var(--white); font-size: 13px; font-weight: 700;
  min-width: 0;
}

/* ====== Toast ====== */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: var(--white);
  padding: 12px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 1000; animation: toastIn 0.3s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ====== Bottom Nav ====== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--border);
  padding: 12px 16px; z-index: 100;
  max-width: 600px; margin: 0 auto;
}

/* ====== Responsive ====== */
@media (max-width: 400px) {
  .page-title { font-size: 24px; }
  .container { padding: 16px 12px 100px; }
}

/* ====== Success Animation ====== */
.success-screen {
  text-align: center; padding: 60px 20px;
}
.success-icon { font-size: 64px; margin-bottom: 16px; animation: popIn 0.5s ease; }
@keyframes popIn {
  0% { transform: scale(0); }
  80% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============ Simple State Management ============
const CLASSES = ['1반', '2반', '3반', '4반', '5반'];
const TEAMS = ['Team 1', 'Team 2', 'Team 3', 'Team 4', 'Team 5', 'Team 6'];

function storageKey(cls) { return 'jb_ax_ws_' + cls; }
function voteKey(cls) { return 'jb_ax_vote_' + cls; }

let state = {
  screen: 'splash',
  cls: null,    // 반 인덱스 (0~4)
  team: null,
  step: 0,
  data: {
    teamName: '', keyword: '', members: ['','','','','',''],
    roles: ['','','','','',''], checkin: '',
    q1: '', q2: '', q3: '',
    scale: [0,0,0,0,0], diagnosis: '',
    plans: [{area:'',tool:'',effect:'',time:'',who:''},{area:'',tool:'',effect:'',time:'',who:''},{area:'',tool:'',effect:'',time:'',who:''}],
    priority: '', reason: '', expected: '',
    ptPerson: '', ptTool: '',
    ptSlides: ['','','','','',''],
    protoType: '',
    protoPerson: '', protoTool: '',
    protoDesc: '', protoResult: '', protoLesson: '',
  },
  votes: [],
  toast: null,
  ftViewTeam: null,
  editMode: false,
};

function loadSubmissions() {
  try { return JSON.parse(localStorage.getItem(storageKey(state.cls)) || '{}'); }
  catch { return {}; }
}
function saveSubmission(teamIdx, data) {
  const all = loadSubmissions();
  all[teamIdx] = { ...data, submittedAt: new Date().toISOString() };
  localStorage.setItem(storageKey(state.cls), JSON.stringify(all));
}
function loadVotes() {
  try { return JSON.parse(localStorage.getItem(voteKey(state.cls)) || '{}'); }
  catch { return {}; }
}
function saveVote(voterKey, teamIndices) {
  const all = loadVotes();
  all[voterKey] = teamIndices;
  localStorage.setItem(voteKey(state.cls), JSON.stringify(all));
}
function getVoteCounts() {
  const all = loadVotes();
  const counts = [0,0,0,0,0,0];
  Object.values(all).forEach(indices => {
    indices.forEach(i => { if (i >= 0 && i < 6) counts[i]++; });
  });
  return counts;
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ============ Render Engine ============
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'splash': app.innerHTML = renderSplash(); break;
    case 'classSelect': app.innerHTML = renderClassSelect(); break;
    case 'teamSelect': app.innerHTML = renderTeamSelect(); break;
    case 'worksheet': app.innerHTML = renderWorksheet(); break;
    case 'submitted': app.innerHTML = renderSubmitted(); break;
    case 'afternoon': app.innerHTML = renderAfternoon(); break;
    case 'allDone': app.innerHTML = renderAllDone(); break;
    case 'editSelect': app.innerHTML = renderEditSelect(); break;
    case 'voting': app.innerHTML = renderVoting(); break;
    case 'voteDone': app.innerHTML = renderVoteDone(); break;
    case 'ftLogin': app.innerHTML = renderFtLogin(); break;
    case 'ftClassSelect': app.innerHTML = renderFtClassSelect(); break;
    case 'ftDashboard': app.innerHTML = renderFtDashboard(); break;
    case 'ftDetail': app.innerHTML = renderFtDetail(); break;
  }
  if (state.toast) {
    app.innerHTML += `<div class="toast">${state.toast}</div>`;
  }
}

// ============ Screens ============
function renderSplash() {
  return `
    <div class="splash">
      <h1>JUNIOR BOARD</h1>
      <h2>AX Mini <span class="splash-red">워크샵</span></h2>
      <h3>팀 워크시트 & 투표</h3>
      <button class="btn-primary" onclick="setState({screen:'classSelect'})" style="font-size:18px">
        참가자 입장 →
      </button>
      <button class="ft-link" onclick="setState({screen:'ftLogin'})">FT(관리자) 입장</button>
    </div>
  `;
}

function renderClassSelect() {
  return `
    ${renderHeader('반 선택', true)}
    <div class="container">
      <div class="red-line"></div>
      <div class="page-title">반을 선택하세요</div>
      <div class="page-sub">본인이 속한 반을 선택하면 팀 선택 화면으로 이동합니다</div>
      ${CLASSES.map((name, i) => `
        <button class="btn-secondary" onclick="selectClass(${i})"
                style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px">
          <span style="font-size:20px;font-weight:800">${name}</span>
          <span style="color:var(--red);font-size:18px">→</span>
        </button>
      `).join('')}
    </div>
  `;
}

function selectClass(idx) {
  setState({ screen: 'teamSelect', cls: idx });
}

function renderTeamSelect() {
  const subs = loadSubmissions();
  return `
    ${renderHeader(CLASSES[state.cls] + ' · 팀 선택', true, 'goBackToClassSelect')}
    <div class="container">
      <div class="red-line"></div>
      <div class="page-title">${CLASSES[state.cls]} — 팀을 선택하세요</div>
      <div class="page-sub">본인이 속한 팀을 선택하면 워크시트 작성을 시작합니다</div>
      ${TEAMS.map((name, i) => {
        const submitted = subs[i];
        return `
          <button class="btn-secondary ${submitted ? 'selected' : ''}"
                  onclick="selectTeam(${i})"
                  style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:17px;font-weight:700">${name}</span>
            <span class="status ${submitted ? 'status-submitted' : 'status-pending'}">
              ${submitted ? '✓ 제출 완료' : '작성 대기'}
            </span>
          </button>
          ${submitted ? `<div style="text-align:right;margin:-8px 0 12px">
            <button onclick="event.stopPropagation();state.team=${i};state.data={...state.data,...loadSubmissions()[${i}]};goAfternoon()" 
                    style="font-size:13px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline">
              🛠 오후 실습 기록 →
            </button>
          </div>` : ''}
        `;
      }).join('')}
      <div style="margin-top:32px;text-align:center">
        <button class="ft-link" onclick="setState({screen:'voting'})" style="font-size:14px;color:var(--red)">
          ❤️ 스티커 투표 하러 가기 →
        </button>
      </div>
    </div>
  `;
}

function goBackToClassSelect() {
  setState({ screen: 'classSelect', cls: null });
}
function goBackToTeamSelect() {
  setState({ screen: 'teamSelect' });
}

function selectTeam(idx) {
  const subs = loadSubmissions();
  if (subs[idx]) {
    // 제출된 데이터 불러오기
    state.data = { ...state.data, ...subs[idx] };
    state.team = idx;

    // 오후 실습까지 완료했으면 → 수정 화면
    if (subs[idx].protoDesc || subs[idx].ptPerson) {
      setState({ screen: 'editSelect', team: idx });
    } else {
      // 오전만 제출 → 오후 실습(Step 5)부터 시작
      setState({ screen: 'worksheet', team: idx, step: 5 });
    }
  } else {
    // 미제출 → 처음부터
    setState({ screen: 'worksheet', team: idx, step: 0 });
  }
}

// ====== Worksheet Steps ======
const STEP_TITLES = ['팀 소개', 'AI Tool 활용 리뷰', 'AX 현황 진단', 'Action Plan 도출', '최우선 Action Plan', '발표용 PT 제작', 'Prototype 제작'];
const STEP_SESSION = [0,0,0,0,0,1,1]; // 0=오전, 1=오후

function renderWorksheet() {
  const stepRenderers = [renderCover, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6];
  const isAM = state.step <= 4;
  const isPM = state.step >= 5;
  const totalSteps = 7;
  return `
    <div class="header">
      <button class="header-back" onclick="goBackFromWorksheet()">← 뒤로</button>
      <span class="header-title">${CLASSES[state.cls]} ${TEAMS[state.team]} · ${STEP_TITLES[state.step]}</span>
      <span class="header-badge">JB AX</span>
    </div>
    <div class="container">
      <div style="display:flex;gap:4px;margin-bottom:6px">
        <span style="font-size:11px;font-weight:600;color:${isAM?'var(--red)':'var(--gray)'};flex:5;text-align:center">오전 토론</span>
        <span style="font-size:11px;font-weight:600;color:${isPM?'var(--red)':'var(--gray)'};flex:2;text-align:center">오후 실습</span>
      </div>
      <div class="progress-bar">
        ${Array.from({length:totalSteps}, (_,i) => `<div class="progress-dot ${i < state.step ? 'done' : i === state.step ? 'active' : ''}"></div>`).join('')}
      </div>
      ${stepRenderers[state.step]()}
    </div>
    <div class="bottom-nav">
      <div style="display:flex;gap:10px">
        ${state.editMode 
          ? `<button class="btn-secondary" onclick="prevStep()" style="flex:1;margin:0;${state.step===0||state.step===5?'visibility:hidden':''}">← 이전</button>
             <button class="btn-primary" onclick="saveAndReturn()" style="flex:2;background:var(--green)">✓ 저장 & 돌아가기</button>`
          : `${state.step > 0 ? `<button class="btn-secondary" onclick="prevStep()" style="flex:1;margin:0">← 이전</button>` : ''}
             ${state.step === 4 
               ? `<button class="btn-primary" onclick="submitMorning()" style="flex:2;background:var(--green)">✓ 오전 제출</button>`
               : state.step === 6
                 ? `<button class="btn-primary" onclick="submitAll()" style="flex:2;background:var(--green)">✓ 최종 제출</button>`
                 : `<button class="btn-primary" onclick="nextStep()" style="flex:2">다음 →</button>`
             }`
        }
      </div>
    </div>
  `;
}

function renderCover() {
  const d = state.data;
  return `
    <span class="step-badge">오프닝 · 5분</span>
    <div class="page-title">아이스브레이킹 & 팀 소개</div>
    <div class="page-sub">팀명 · 역할 · 키워드를 정해주세요</div>
    
    <div class="card">
      <div class="card-title"><span class="num">1</span> 팀 기본 정보</div>
      <div class="input-group">
        <label class="input-label">팀 명</label>
        <input type="text" value="${esc(d.teamName)}" oninput="updateData('teamName', this.value)" placeholder="예: 번개팀, 혁신팀...">
      </div>
      <div class="input-group">
        <label class="input-label">오늘의 팀 키워드 (한 단어)</label>
        <input type="text" value="${esc(d.keyword)}" oninput="updateData('keyword', this.value)" placeholder="예: 실행, 솔직, 재미...">
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="num">2</span> 팀원 & 역할</div>
      ${[0,1,2,3,4,5].map(i => `
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <input type="text" value="${esc(d.members[i])}" 
                 oninput="updateArray('members',${i},this.value)"
                 placeholder="이름" style="flex:1">
          <input type="text" value="${esc(d.roles[i])}"
                 oninput="updateArray('roles',${i},this.value)"
                 placeholder="역할 (발표자/기록자...)" style="flex:1">
        </div>
      `).join('')}

// ============ Header Helper ============
function renderHeader(title, showBack = false, backFn = null) {
  let backHandler;
  if (!backFn) {
    backHandler = `setState({screen:'splash'})`;
  } else if (typeof backFn === 'string') {
    backHandler = `${backFn}()`;
  } else {
    backHandler = `setState({screen:'splash'})`;
  }
  return `
    <div class="header">
      ${showBack ? `<button class="header-back" onclick="${backHandler}">← 뒤로</button>` : '<div></div>'}
      <span class="header-title">${title}</span>
      <span class="header-badge">JB AX</span>
    </div>
  `;
}

// ============ Data Handlers ============
function updateData(key, value) { state.data[key] = value; }
function updateArray(arrKey, idx, value) { state.data[arrKey][idx] = value; }
function updateScale(idx, value) { state.data.scale[idx] = value; render(); }
function updatePlan(idx, key, value) { state.data.plans[idx][key] = value; }
function updateSlide(idx, value) { state.data.ptSlides[idx] = value; }
function selectProtoType(id) { state.data.protoType = id; render(); }
function addPlan() {
  state.data.plans.push({area:'',tool:'',effect:'',time:'',who:''});
  render();
  setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
}
function nextStep() {
  if (state.step < 6) { state.step++; render(); window.scrollTo(0, 0); }
}
function prevStep() {
  if (state.step > 0) { state.step--; render(); window.scrollTo(0, 0); }
}

  if (!state.data.priority) {
    showToast('❗ 최우선 Action Plan 제목을 입력해주세요');

  saveSubmission(state.team, state.data);
  state.editMode = false;
  setState({ screen: 'submitted' });

            <div style="flex:1">
              <div style="font-size:15px;font-weight:700">${s.title}</div>
              <div style="font-size:13px;color:var(--gray);margin-top:2px">${esc(s.desc)}</div>
            </div>
            <span style="color:var(--red);font-size:18px">→</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function castVote(teamIdx, voterId) {
  const votes = loadVotes();
  const myVotes = votes[voterId] || [];
  
  // 이미 투표한 팀이면 취소
  if (myVotes.includes(teamIdx)) {
    votes[voterId] = myVotes.filter(v => v !== teamIdx);
    localStorage.setItem(VOTE_KEY, JSON.stringify(votes));
    showToast('투표를 취소했습니다');
    return;
  }
  
  // 2표 제한
  if (myVotes.length >= 2) {
    showToast('❗ 최대 2표까지만 투표 가능합니다');
    return;
  }
  
  // 본인 팀 체크 (team이 설정된 경우)
  if (state.team !== null && teamIdx === state.team) {
    showToast('❗ 본인 팀에는 투표할 수 없습니다');
    return;
  }
  
  myVotes.push(teamIdx);
  votes[voterId] = myVotes;
  localStorage.setItem(VOTE_KEY, JSON.stringify(votes));
  showToast('❤️ 투표 완료!');
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============ Init ============
render();
</script>
</body>
</html>
