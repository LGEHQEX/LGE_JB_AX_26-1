<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 JB AX Mini Workshop 운영 결과 보고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--red-light:#FDE7EA;--dark:#1A1A1A;--white:#FFF;--gray:#6B7280;--light:#F9FAFB;--border:#E5E7EB;--green:#059669}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--light);color:var(--dark);line-height:1.7;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@media print{.no-print{display:none!important}.page-break{page-break-before:always}body{background:#fff}.report-container{max-width:100%;padding:0 20px}}
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:opacity .5s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-spin{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.report-container{max-width:1100px;margin:0 auto;padding:0 24px 60px}
.cover{background:var(--dark);padding:80px 0 60px;margin-bottom:40px;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--red)}
.cover::after{content:'AX';position:absolute;right:-30px;top:50%;transform:translateY(-50%);font-size:280px;font-weight:900;color:rgba(255,255,255,.03)}
.cover-inner{max-width:1100px;margin:0 auto;padding:0 40px;position:relative;z-index:1}
.cover-label{font-size:12px;color:var(--gray);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.cover h1{font-size:44px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:8px}
.cover h1 span{color:var(--red)}
.cover-sub{font-size:18px;color:var(--gray);margin-bottom:40px}
.cover-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.cover-meta-item{border-left:3px solid var(--red);padding-left:16px}
.cover-meta-item dt{font-size:11px;color:var(--gray);margin-bottom:4px}
.cover-meta-item dd{font-size:14px;color:#fff;font-weight:500}
.section{margin-bottom:40px}
.section-title{font-size:24px;font-weight:900;padding-bottom:12px;margin-bottom:24px;border-bottom:3px solid var(--red);display:flex;align-items:center;gap:12px}
.section-title .badge{background:var(--red);color:#fff;padding:4px 14px;border-radius:4px;font-size:13px;font-weight:700}
.summary-table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:32px;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.summary-table thead th{background:var(--dark);color:#fff;padding:14px 16px;font-size:13px;font-weight:700;text-align:left;white-space:nowrap}
.summary-table thead th:first-child{width:60px}
.summary-table thead th:nth-child(2){width:100px}
.summary-table tbody tr{background:#fff}
.summary-table tbody tr:nth-child(even){background:var(--light)}
.summary-table tbody td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
.cls-label{font-weight:800;color:var(--red);font-size:14px}
.team-label{font-weight:700;color:var(--dark);white-space:nowrap}
.plan-text{font-weight:700;color:var(--red)}
.no-data-cell{color:var(--gray);font-style:italic}
.class-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.class-tab{padding:10px 24px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--dark);transition:all .2s}
.class-tab:hover{border-color:var(--red);color:var(--red)}
.class-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.team-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:20px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.team-header{background:var(--dark);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.team-header h3{font-size:18px;font-weight:800}
.team-header .team-badge{background:var(--red);padding:4px 14px;border-radius:4px;font-size:13px;font-weight:700}
.team-body{padding:24px}
.team-members{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.member-chip{background:var(--light);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border)}
.qa-block{margin-bottom:20px}
.qa-label{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
.qa-question{font-size:15px;font-weight:700;margin-bottom:8px}
.qa-answer{font-size:14px;color:#374151;line-height:1.8;background:var(--light);padding:14px 18px;border-radius:8px;border-left:3px solid var(--red);white-space:pre-wrap}
.scale-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.scale-item{background:var(--light);padding:12px 8px;border-radius:8px;text-align:center}
.scale-item-label{font-size:11px;color:var(--gray);margin-bottom:4px}
.scale-item-value{font-size:28px;font-weight:900;color:var(--red)}
.scale-item-max{font-size:12px;color:var(--gray)}
.plan-card{background:var(--light);border-radius:10px;padding:16px 20px;margin-bottom:12px;border:1px solid var(--border)}
.plan-card.priority{border:2px solid var(--red);background:var(--red-light)}
.plan-title{font-size:15px;font-weight:800;margin-bottom:8px}
.plan-num{color:var(--red);margin-right:4px}
.plan-detail{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:13px}
.plan-detail dt{color:var(--gray);font-weight:500}
.plan-detail dd{color:var(--dark);font-weight:600}
.proto-block{background:#fff;border-radius:10px;padding:20px;border:1px solid var(--border);margin-top:16px}
.proto-block h4{font-size:16px;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red)}
.proto-field{margin-bottom:12px}
.proto-field-label{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
.proto-field-value{font-size:14px;color:#374151;line-height:1.7;white-space:pre-wrap}
.vote-bar-row{margin-bottom:14px}
.vote-bar-header{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:4px}
.vote-bar-track{height:36px;background:var(--light);border-radius:8px;overflow:hidden}
.vote-bar-fill{height:100%;background:var(--red);border-radius:8px;display:flex;align-items:center;padding-left:12px;color:#fff;font-size:13px;font-weight:700;transition:width .6s}
.vote-detail{display:flex;gap:6px;margin-top:4px;font-size:11px;color:var(--gray)}
.no-data{text-align:center;padding:48px 20px;color:var(--gray);font-size:15px}
.print-btn{position:fixed;bottom:30px;right:30px;background:var(--red);color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(200,16,46,.3);font-family:inherit;z-index:100;transition:transform .2s}
.print-btn:hover{transform:translateY(-2px)}
.voice-intro{font-size:16px;line-height:1.8;color:#374151;margin-bottom:28px;padding:20px 24px;background:var(--red-light);border-radius:12px;border-left:4px solid var(--red)}
.voice-intro strong{color:var(--red)}
.voice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:8px}
.voice-card{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid var(--border);position:relative}
.voice-card::before{content:'\201C';position:absolute;top:8px;left:14px;font-size:36px;color:var(--red);opacity:0.2;font-family:Georgia,serif;line-height:1}
.voice-card-text{font-size:14px;color:#374151;line-height:1.7;padding-left:8px}
.voice-card-from{font-size:12px;color:var(--gray);margin-top:8px;text-align:right;font-weight:600}
@media(max-width:768px){.voice-grid{grid-template-columns:1fr}}
@media(max-width:768px){.cover h1{font-size:28px}.cover-meta{grid-template-columns:repeat(2,1fr)}.scale-grid{grid-template-columns:repeat(3,1fr)}.plan-detail{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loading-screen" id="loading"><div class="loading-spin"></div><div style="font-size:16px;font-weight:600">데이터를 불러오는 중...</div></div>
<div id="report"></div>
<button class="print-btn no-print" onclick="window.print()">🖨 PDF 저장 / 인쇄</button>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyACZTTEzdrqCz3LGO28R55WmbAboHmY5OY",authDomain:"jb-ax-20f08.firebaseapp.com",databaseURL:"https://jb-ax-20f08-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"jb-ax-20f08"});
const db=firebase.database(),CLASSES=['1반','2반','3반','4반','5반'],TEAMS=['A팀','B팀','C팀','D팀','E팀','F팀'],SL=['AI Tool 인지·이해','사용 빈도','활용 업무 범위','성과·효율 체감','조직 내 확산'];
let D={},ac=0;
async function load(){const s=await db.ref('workshop').once('value'),r=s.val()||{};for(let i=0;i<5;i++){const k='class_'+i;D[i]={submissions:r[k]?.submissions||{},votes:r[k]?.votes||{},peers:r[k]?.peers||{}}}document.getElementById('loading').classList.add('hide');setTimeout(()=>document.getElementById('loading').style.display='none',600);render()}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function tr(s,n){if(!s)return'';return s.length>n?s.substring(0,n)+'…':s}
function gcs(c){const v=D[c]?.votes||{},su={};for(let i=0;i<6;i++)su[i]={s1:0,s2:0,s3:0,s4:0,total:0,count:0};Object.values(v).forEach(vs=>{Object.entries(vs).forEach(([ti,sc])=>{const t=parseInt(ti);if(t>=0&&t<6&&sc&&typeof sc==='object'){su[t].s1+=(sc.s1||0);su[t].s2+=(sc.s2||0);su[t].s3+=(sc.s3||0);su[t].s4+=(sc.s4||0);su[t].total+=(sc.s1||0)+(sc.s2||0)+(sc.s3||0)+(sc.s4||0);su[t].count++}})});return su}
function render(){
document.getElementById('report').innerHTML=`
<div class="cover"><div class="cover-inner">
<div class="cover-label">LG Electronics · Employee eXperience & Growth</div>
<h1>2026 JB AX 역량강화<br><span>Mini Workshop</span> 운영 결과 보고</h1>
<div class="cover-sub">반별 토론 내용 · Action Plan · Prototype 결과물 종합</div>
<div class="cover-meta">
<dl class="cover-meta-item"><dt>일시</dt><dd>2026. 4. 23~24, 27~28</dd></dl>
<dl class="cover-meta-item"><dt>장소</dt><dd>평택 Learning Center</dd></dl>
<dl class="cover-meta-item"><dt>대상</dt><dd>JB 전체 ~291명</dd></dl>
<dl class="cover-meta-item"><dt>주관</dt><dd>EXG팀 · AX Center · EXAONE팀</dd></dl>
</div></div></div>
<div class="report-container">
<div class="section"><div class="section-title">JB Real Voice <span class="badge">AX 진단 종합 의견</span></div>${realVoice()}</div>
<div class="section"><div class="section-title">전체 요약 <span class="badge">한눈에 보기</span></div>${sumTbl()}</div>
<div class="section page-break"><div class="section-title">반별 상세 결과 <span class="badge">토론 · Plan · Prototype</span></div>
<div class="class-tabs no-print">${CLASSES.map((n,i)=>`<div class="class-tab ${i===ac?'active':''}" onclick="sw(${i})">${n} (${Object.keys(D[i]?.submissions||{}).length}팀)</div>`).join('')}<div class="class-tab" onclick="showAll()" style="background:var(--dark);color:#fff;border-color:var(--dark)">전체 보기</div></div>
<div id="cc"></div></div>
<div class="section page-break"><div class="section-title">심사 투표 결과 <span class="badge">전체 반</span></div><div id="vc"></div></div>
</div>`;
rc();rv()}

function realVoice(){
// 전체 진단 의견 수집
let voices=[];
let totalScale=[0,0,0,0,0],teamCount=0;
for(let c=0;c<5;c++){
const subs=D[c]?.submissions||{};
Object.entries(subs).forEach(([ti,s])=>{
if(s.diagnosis){voices.push({text:s.diagnosis,from:CLASSES[c]+' '+TEAMS[parseInt(ti)]})}
const sc=s.scale||[0,0,0,0,0];
if(sc.some(v=>v>0)){sc.forEach((v,i)=>{totalScale[i]+=v});teamCount++}
})}
// 전체 평균
const avgAll=teamCount>0?(totalScale.reduce((a,b)=>a+b,0)/(teamCount*5)).toFixed(1):'0';
const avgItems=teamCount>0?SL.map((l,i)=>`${l} <strong style="color:var(--red)">${(totalScale[i]/teamCount).toFixed(1)}</strong>`).join(' · '):'';
// 인트로 문구 자동 생성
const lowIdx=totalScale.indexOf(Math.min(...totalScale));
const highIdx=totalScale.indexOf(Math.max(...totalScale));
const lowLabel=teamCount>0?SL[lowIdx]:'';
const highLabel=teamCount>0?SL[highIdx]:'';

const introText=teamCount>0
?`이번 AX 과정을 진행하면서 <strong>JB ${teamCount}개 팀의 Real Voice</strong>를 들어보았습니다.<br>
전체 AX 활용 수준 평균은 <strong>${avgAll}/5점</strong>으로, 항목별로는 ${avgItems} 입니다.<br>
<strong>${highLabel}</strong> 영역이 가장 높고, <strong>${lowLabel}</strong> 영역이 가장 낮아 향후 이 부분의 역량 강화가 필요합니다.`
:'데이터가 아직 없습니다.';

if(!voices.length) return `<div class="voice-intro">${introText}</div><div class="no-data">📭 아직 진단 의견이 없습니다.</div>`;

return `<div class="voice-intro">${introText}</div>
<div class="voice-grid">${voices.map(v=>`
<div class="voice-card">
<div class="voice-card-text">${esc(v.text)}</div>
<div class="voice-card-from">— ${esc(v.from)}</div>
</div>`).join('')}</div>`}

function sumTbl(){
let rows='';
for(let c=0;c<5;c++){
const subs=D[c]?.submissions||{},keys=Object.keys(subs);
if(!keys.length){rows+=`<tr><td class="cls-label">${CLASSES[c]}</td><td colspan="4" class="no-data-cell">제출된 워크시트 없음</td></tr>`;continue}
keys.forEach((ti,idx)=>{
const s=subs[ti],teamFixed=TEAMS[parseInt(ti)]||('Team '+ti),sc=s.scale||[0,0,0,0,0],diag=s.diagnosis||'',plan=s.priority||'';
const filled=sc.filter(v=>v>0);
const scaleAvg=filled.length>0?(sc.reduce((a,b)=>a+b,0)/filled.length).toFixed(1):'';
rows+=`<tr>${idx===0?`<td class="cls-label" rowspan="${keys.length}">${CLASSES[c]}</td>`:''}
<td class="team-label">${esc(teamFixed)}</td>
<td>${diag?esc(diag):'<span class="no-data-cell">-</span>'}</td>
<td style="text-align:center">${scaleAvg?`<span style="font-size:18px;font-weight:900;color:var(--red)">${scaleAvg}</span><span style="font-size:12px;color:var(--gray)">/5</span>`:'<span class="no-data-cell">-</span>'}</td>
<td>${plan?`<span class="plan-text">${esc(plan)}</span>${s.expected?`<br><span style="font-size:12px;color:#374151">${esc(s.expected)}</span>`:''}`:'<span class="no-data-cell">-</span>'}</td></tr>`})}
return `<table class="summary-table"><thead><tr><th>반</th><th>팀</th><th>AX 현황 진단</th><th style="text-align:center">평균점수</th><th>최우선 Action Plan</th></tr></thead><tbody>${rows}</tbody></table>`}

function sw(i){ac=i;document.querySelectorAll('.class-tab').forEach((t,j)=>t.classList.toggle('active',j===i));rc()}
function showAll(){document.querySelectorAll('.class-tab').forEach(t=>t.classList.remove('active'));let h='';for(let c=0;c<5;c++){h+=`<h2 style="font-size:22px;font-weight:900;color:var(--red);margin:32px 0 16px;padding-top:20px;border-top:3px solid var(--border)">${CLASSES[c]}</h2>`;h+=rct(c)}document.getElementById('cc').innerHTML=h}
function rc(){document.getElementById('cc').innerHTML=rct(ac)}

function rct(cls){
const subs=D[cls]?.submissions||{};
if(!Object.keys(subs).length)return`<div class="no-data">📭 ${CLASSES[cls]}에 제출된 워크시트가 없습니다.</div>`;
return TEAMS.map((tn,i)=>{
const s=subs[i];if(!s)return'';
const dn=s.teamName||tn,mb=(s.members||[]).filter(m=>m),rl=s.roles||[],sc=s.scale||[0,0,0,0,0],pl=(s.plans||[]).filter(p=>p.area);
return`<div class="team-card"><div class="team-header"><h3>${esc(dn)}</h3><span class="team-badge">${CLASSES[cls]} ${tn}</span></div><div class="team-body">
${mb.length?`<div class="team-members">${mb.map((m,mi)=>`<span class="member-chip">${esc(m)}${rl[mi]?` · ${esc(rl[mi])}`:''}</span>`).join('')}</div>`:''}
${s.keyword?`<div style="margin-bottom:16px"><span style="background:var(--dark);color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:700">키워드: ${esc(s.keyword)}</span></div>`:''}
${(s.q1||s.q2||s.q3)?`<div style="margin-bottom:20px"><h4 style="font-size:16px;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red)">AI Tool 활용 리뷰</h4>
${s.q1?`<div class="qa-block"><div class="qa-label">Q1</div><div class="qa-question">어떤 AI Tool을 써봤나요?</div><div class="qa-answer">${esc(s.q1)}</div></div>`:''}
${s.q2?`<div class="qa-block"><div class="qa-label">Q2</div><div class="qa-question">가장 인상 깊었던 경험은?</div><div class="qa-answer">${esc(s.q2)}</div></div>`:''}
${s.q3?`<div class="qa-block"><div class="qa-label">Q3</div><div class="qa-question">우리 업무에 연결된다면?</div><div class="qa-answer">${esc(s.q3)}</div></div>`:''}
</div>`:''}
${sc.some(v=>v>0)?`<div style="margin-bottom:20px"><h4 style="font-size:16px;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red)">AX 현황 진단</h4>
<div class="scale-grid">${SL.map((l,si)=>`<div class="scale-item"><div class="scale-item-label">${l}</div><div class="scale-item-value">${sc[si]||'-'}<span class="scale-item-max"> /5</span></div></div>`).join('')}</div>
${s.diagnosis?`<div class="qa-answer" style="margin-top:8px">${esc(s.diagnosis)}</div>`:''}</div>`:''}
${pl.length?`<div style="margin-bottom:20px"><h4 style="font-size:16px;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red)">Action Plans</h4>
${pl.map((p,pi)=>`<div class="plan-card"><div class="plan-title"><span class="plan-num">Plan ${pi+1}</span> ${esc(p.area)}</div>
<div class="plan-detail"><dt>AI Tool</dt><dd>${esc(p.tool||'-')}</dd><dt>기대 효과</dt><dd>${esc(p.effect||'-')}</dd><dt>실행 시기</dt><dd>${esc(p.time||'-')}</dd><dt>담당자</dt><dd>${esc(p.who||'-')}</dd></div></div>`).join('')}</div>`:''}
${s.priority?`<div style="margin-bottom:20px"><h4 style="font-size:16px;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red)">🏆 최우선 Action Plan</h4>
<div class="plan-card priority"><div class="plan-title" style="font-size:18px;color:var(--red)">${esc(s.priority)}</div>
${s.reason?`<div style="font-size:14px;margin-top:8px"><strong>선정 이유:</strong> ${esc(s.reason)}</div>`:''}
${s.expected?`<div style="font-size:14px;margin-top:4px"><strong>기대 효과:</strong> ${esc(s.expected)}</div>`:''}</div></div>`:''}
${s.ptPerson?`<div class="proto-block"><h4>📑 발표용 PT 제작</h4>
<div style="font-size:14px;margin-bottom:12px"><strong>담당자:</strong> ${esc(s.ptPerson)} · <strong>AI Tool:</strong> ${esc(s.ptTool||'-')}</div>
${(s.ptSlides||[]).some(x=>x)?['팀 소개','AI 경험','AX 현황','Action Plan','최우선 Plan','Prototype'].map((lb,si)=>(s.ptSlides||[])[si]?`<div style="margin-bottom:6px;padding:8px 14px;background:var(--light);border-radius:6px;border-left:3px solid var(--red);font-size:13px"><strong style="color:var(--red)">${si+1}.</strong> ${esc(s.ptSlides[si])}</div>`:'').join(''):''}</div>`:''}
${(s.protoDesc||s.protoPerson)?`<div class="proto-block" style="margin-top:16px"><h4>🔧 Prototype 제작 결과</h4>
<div style="font-size:14px;margin-bottom:12px"><strong>담당자:</strong> ${esc(s.protoPerson||'-')} · <strong>AI Tool:</strong> ${esc(s.protoTool||'-')}${s.protoType?` · <strong>유형:</strong> ${esc(s.protoType)}`:''}</div>
${s.protoDesc?`<div class="proto-field"><div class="proto-field-label">무엇을 만들었나요?</div><div class="proto-field-value">${esc(s.protoDesc)}</div></div>`:''}
${s.protoResult?`<div class="proto-field"><div class="proto-field-label">결과물</div><div class="proto-field-value">${esc(s.protoResult)}</div></div>`:''}
${s.protoLesson?`<div class="proto-field"><div class="proto-field-label">배운 점 · 아쉬운 점</div><div class="proto-field-value">${esc(s.protoLesson)}</div></div>`:''}</div>`:''}
</div></div>`}).join('')}

function rv(){
const ct=document.getElementById('vc');let h='';
for(let c=0;c<5;c++){const subs=D[c]?.submissions||{},su=gcs(c),vc=Object.keys(D[c]?.votes||{}).length,mx=Math.max(...Object.values(su).map(s=>s.total),1);
if(!vc)continue;
h+=`<div style="margin-bottom:32px"><h3 style="font-size:18px;font-weight:800;margin-bottom:4px">${CLASSES[c]}</h3><div style="font-size:13px;color:var(--gray);margin-bottom:16px">채점 참여: ${vc}명</div>
${TEAMS.map((n,i)=>{const sub=subs[i],tnn=sub?(sub.teamName||n):n,s=su[i],pct=mx>0?Math.round(s.total/mx*100):0,avg=s.count>0?Math.round(s.total/s.count):0;
if(!s.total&&!s.count)return'';
return`<div class="vote-bar-row"><div class="vote-bar-header"><span>${esc(tnn)}</span><span style="color:var(--red)">${s.total}점 ${s.count>0?`(평균 ${avg})`:''}</span></div>
<div class="vote-bar-track"><div class="vote-bar-fill" style="width:${pct}%">${s.total>0?s.total:''}</div></div>
<div class="vote-detail"><span>실현 ${s.s1}</span> · <span>완성도 ${s.s2}</span> · <span>발표 ${s.s3}</span> · <span>참여 ${s.s4}</span></div></div>`}).join('')}</div>`}
ct.innerHTML=h||'<div class="no-data">📭 아직 투표 결과가 없습니다.</div>'}
load();
</script>
</body>
</html>
